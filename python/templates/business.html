<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Business Studies</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="p-5">

<a href="/main" class="btn btn-secondary" style="position: fixed; top: 20px; left: 20px; z-index: 1000;">
    Home
</a>

<div class="container-fluid">
    <div class="page-layout">
        <div class="content-panel">

            <h1 class="text-center mb-5">Business Topics</h1>

            {% for topic in topics %}
                <div class="mb-4">
                    <h5>{{ topic.title }}</h5>
                    <button class="btn btn-primary mb-2" onclick="markStudied({{ loop.index }})" data-bs-toggle="collapse" data-bs-target="#content{{ loop.index }}">
                        Show Content 
                    </button>
                    <span id="status{{ loop.index }}" class="badge bg-secondary">
                        Not Studied
                    </span>
                    <div class="collapse mb-3" id="content{{ loop.index }}">
                        <div class="p-3 bg-light border rounded">
                            <pre class="study-table">
                                {{ topic.content }}
                            </pre>
                        <hr> 
                        <strong>Questions:</strong>
                        <pre>{{topic.questions}}</pre>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>

        <div class="ai-panel">
            <h3 class="mb-3">AI Study Assistant</h3>
            <div id="chat-box" class="chat-box">
                <div class="ai-message">Ask me anything about Business Studies</div>
            </div>

            <form id="chat-form" class="chat-form">
                <input type="text" id="user-input" class="form-control" placeholder="Ask a question...">
                <button type="submit" class="btn btn-primary mt-2">Send</button>
            </form>
        </div> 
    </div>
</div> 


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function markStudied(topicNumber) {
    const status = document.getElementById("status" + topicNumber);
    
    status.innerHTML = "✓ Studied";
    status.classList.remove("bg-secondary");
    status.classList.add("bg-success");
}

const form = document.getElementById("chat-form");

form.addEventListener("submit", async function(e) {

    e.preventDefault();

    const input = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");
    const message = input.value;

    if (message.trim() === "") return;

    chatBox.innerHTML += `
        <div class="user-message">
            ${message}
        </div>
    `;

    input.value = "";

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message
            })
        });

        if (!response.ok) { 
            const errorText = await response.text();
            throw new Error(errorText);
        }

        const data = await response.json();

        chatBox.innerHTML += `
            <div class="ai-message">
                ${data.reply}
            </div>
        `;

    } catch (error) {
        console.error(error);

        chatBox.innerHTML += `
            <div class="message ai">
                ${error.message}
            </div>
        `;
    }

    chatBox.scrollTop = chatBox.scrollHeight;

});

</script>
</body>
</html>
